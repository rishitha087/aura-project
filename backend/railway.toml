[build]
builder = "nixpacks"
# Run migrations and static collection at BUILD time, before the container starts.
# This way the container is ready to serve traffic the instant gunicorn starts —
# Railway's health probe won't time out waiting for pre-flight commands to finish.
buildCommand = "pip install -r requirements.txt && python manage.py collectstatic --noinput"

[deploy]
# Only gunicorn runs at container start — port binds in <1 second.
# migrate is also here as a safety net (idempotent, fast after first run).
startCommand = "python manage.py migrate --noinput && gunicorn mock_interview_api.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info"

# Health check path — this endpoint returns 200 immediately (no DB call)
healthcheckPath = "/api/health/"

# Give the container 300 seconds to pass a health check on first boot.
# On first deploy, migrate may create all tables which takes time.
# On subsequent deploys, this is fast (<5s).
healthcheckTimeout = 300

restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
