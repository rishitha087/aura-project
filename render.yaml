services:
  - type: web
    name: prepsync-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate --noinput && gunicorn mock_interview_api.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info"
    envVars:
      - key: IS_PRODUCTION
        value: "True"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: true
      - key: GEMINI_API_KEY
        sync: true
      - key: RAZORPAY_KEY_ID
        sync: true
      - key: RAZORPAY_KEY_SECRET
        sync: true
      - key: EMAIL_OTP_ENABLED
        value: "false"
      - key: SMS_OTP_ENABLED
        value: "false"
      - key: ALLOWED_HOSTS
        value: "*"
    disk:
      name: prepsync-media
      mountPath: /data
      sizeGB: 1
